services:
  db:
    image: postgres:16-alpine
    container_name: eltera-assess-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eltera
      POSTGRES_PASSWORD: eltera
      POSTGRES_DB: eltera
    volumes:
      - eltera_assess_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eltera -d eltera"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [assessnet]

  api:
    build: ./backend
    image: eltera-assess-api:latest
    container_name: eltera-assess-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Переопределяем поверх .env: внутренний Postgres + публичный адрес + CORS.
      DATABASE_URL: postgresql+asyncpg://eltera:eltera@db:5432/eltera
      APP_PUBLIC_URL: http://72.56.93.215:8080
      CORS_ORIGINS: '["*"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    networks: [assessnet]

  web:
    image: nginx:alpine
    container_name: eltera-assess-web
    restart: unless-stopped
    volumes:
      - ./web-app:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    ports:
      - "8080:80"
    networks: [assessnet]

volumes:
  eltera_assess_pgdata:

networks:
  assessnet:
    driver: bridge
