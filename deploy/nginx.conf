server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /assets/* и result-screen.png физически лежат в /public (как в server.js).
    location /assets/ {
        alias /usr/share/nginx/html/public/assets/;
        access_log off;
        expires 7d;
    }
    location = /result-screen.png {
        alias /usr/share/nginx/html/public/result-screen.png;
    }

    # Остальное (index.html, /src/*.js, /src/styles.css) — из корня как есть.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
