# Host-nginx для eltera-ai.ru (+ www). Шаблон для первичного бутстрапа —
# на живом сервере файл /etc/nginx/sites-available/eltera управляется certbot-ом
# (дописывает 443-блок и редирект 80→443) и НЕ является симлинком на этот файл.
# Отдаёт статику web-app и проксирует /api/ в контейнер api (127.0.0.1:8001).
# TLS-блок (443, listen ssl, сертификаты) дописывает certbot --nginx.
server {
    listen 80;
    listen [::]:80;
    server_name eltera-ai.ru www.eltera-ai.ru;

    root /opt/eltera-assessment/web-app;
    index index.html;

    client_max_body_size 25m;

    # API -> контейнер бэкенда. Префикс /api/ сохраняется (роуты у бэка под /api).
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # /assets/* и result-screen.png физически лежат в web-app/public (как в server.js).
    location /assets/ {
        alias /opt/eltera-assessment/web-app/public/assets/;
        access_log off;
        expires 7d;
    }
    location = /result-screen.png {
        alias /opt/eltera-assessment/web-app/public/result-screen.png;
    }

    # SPA. В index.html на лету вставляем базу API (same-origin /api),
    # чтобы не править закоммиченный index.html и переживать git pull.
    location / {
        try_files $uri $uri/ /index.html;
        sub_filter '</head>' '<script>window.ELTERA_API_BASE="/api";</script></head>';
        sub_filter_once on;
    }
}
