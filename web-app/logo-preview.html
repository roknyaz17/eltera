<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ELTERA Logo Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; }
  .section { padding: 40px 60px; }
  .dark { background: #0A0F1E; }
  .light { background: #F0F4F8; }
  .mid { background: #FFFFFF; border-top: 1px solid #E2E8F0; border-bottom: 1px solid #E2E8F0; }
  .label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 20px; opacity: 0.5; }
  .dark .label { color: #fff; }
  .light .label, .mid .label { color: #0B1730; }
  .logo-row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .logo-item { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .logo-item span { font-size: 10px; opacity: 0.4; }
  .dark .logo-item span { color: #fff; }
  .light .logo-item span, .mid .logo-item span { color: #0B1730; }
  img, object { display: block; }
</style>
</head>
<body>

<div class="section dark">
  <div class="label">Dark background — eltera-dark.svg</div>
  <div class="logo-row">
    <div class="logo-item">
      <img src="/eltera-dark.svg" width="230" height="50">
      <span>230 × 50</span>
    </div>
    <div class="logo-item">
      <img src="/eltera-dark.svg" width="160" height="35">
      <span>160 × 35</span>
    </div>
    <div class="logo-item">
      <img src="/eltera-dark.svg" width="100" height="22">
      <span>100 × 22</span>
    </div>
  </div>
</div>

<div class="section mid">
  <div class="label">White background — eltera-dark.svg (with dark text)</div>
  <div class="logo-row">
    <div class="logo-item">
      <img src="/eltera-dark.svg" width="230" height="50">
      <span>230 × 50</span>
    </div>
  </div>
</div>

<div class="section light">
  <div class="label">Light background — eltera-light.svg</div>
  <div class="logo-row">
    <div class="logo-item">
      <img src="/eltera-light.svg" width="230" height="50">
      <span>230 × 50</span>
    </div>
    <div class="logo-item">
      <img src="/eltera-light.svg" width="160" height="35">
      <span>160 × 35</span>
    </div>
    <div class="logo-item">
      <img src="/eltera-light.svg" width="100" height="22">
      <span>100 × 22</span>
    </div>
  </div>
</div>

</body>
</html>
