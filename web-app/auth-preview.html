<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Preview — Eltera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A0F1E;
    --panel: #111A33;
    --blue: #1E5BFF;
    --cyan: #00E5D4;
    --pink: #C850C0;
    --text: #E6F2FF;
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Пульсирующий фон ── */
  .authBg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #080D1A;
  }

  /* Синий орб — верхний левый */
  .authBg .orb1 {
    position: absolute;
    width: 750px;
    height: 750px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(30,91,255,0.22) 0%, transparent 65%);
    top: -220px;
    left: -180px;
    animation: orbPulse1 9s ease-in-out infinite;
  }

  /* Бирюзовый орб — правый нижний */
  .authBg .orb2 {
    position: absolute;
    width: 650px;
    height: 650px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,212,0.15) 0%, transparent 65%);
    bottom: -180px;
    right: -120px;
    animation: orbPulse2 11s ease-in-out infinite;
  }

  /* Розовый орб — центральный */
  .authBg .orb3 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,80,192,0.12) 0%, transparent 65%);
    top: 40%;
    left: 30%;
    transform: translate(-50%, -50%);
    animation: orbPulse3 13s ease-in-out infinite;
  }

  /* Дополнительный синий орб — правый верхний */
  .authBg .orb4 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(30,91,255,0.10) 0%, transparent 65%);
    top: -80px;
    right: 100px;
    animation: orbPulse4 15s ease-in-out infinite;
  }

  @keyframes orbPulse1 {
    0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.7; }
    33% { transform: scale(1.12) translate(25px, 15px); opacity: 1; }
    66% { transform: scale(0.95) translate(-10px, 20px); opacity: 0.6; }
  }
  @keyframes orbPulse2 {
    0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.6; }
    40% { transform: scale(1.18) translate(-20px, -25px); opacity: 1; }
    70% { transform: scale(0.92) translate(15px, -10px); opacity: 0.5; }
  }
  @keyframes orbPulse3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.35); opacity: 0.85; }
  }
  @keyframes orbPulse4 {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    60% { transform: scale(1.25) translate(-15px, 20px); opacity: 0.7; }
  }

  /* ── Layout ── */
  .authPage {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    gap: 44px;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── Brand ── */
  .authBrand {
    animation: fadeSlideUp 0.7s ease both;
  }

  .authBrand img {
    height: 34px;
    width: auto;
    margin-bottom: 28px;
    display: block;
  }

  .authBrand h1 {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.08;
    margin-bottom: 16px;
  }

  .gradientText {
    background: linear-gradient(135deg, #00E5D4 0%, #1E5BFF 60%, #00E5D4 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 5s linear infinite;
    display: inline;
  }

  .whiteText {
    color: #FFFFFF;
    -webkit-text-fill-color: #FFFFFF;
    display: inline;
  }

  @keyframes gradientShift {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .authBrand p {
    font-size: 15px;
    color: rgba(230,242,255,0.5);
    line-height: 1.65;
    max-width: 400px;
  }

  /* ── Card ── */
  .authCard {
    background: rgba(11,16,32,0.80);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(30,91,255,0.16);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
    animation: fadeSlideUp 0.7s 0.15s ease both;
  }

  /* ── Pill switcher ── */
  .authPill {
    padding: 18px 20px 0;
  }

  .authPillInner {
    display: flex;
    background: rgba(255,255,255,0.05);
    border-radius: 100px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .authPillBtn {
    flex: 1;
    padding: 9px 16px;
    border-radius: 100px;
    border: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    color: rgba(230,242,255,0.38);
    background: transparent;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .authPillBtn.active {
    background: linear-gradient(135deg, #1E5BFF, #0EA5E9);
    color: #fff;
    box-shadow: 0 4px 14px rgba(30,91,255,0.35);
  }

  /* ── Form wrapper (плавное раскрытие) ── */
  .authFormWrap {
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.35s ease;
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }

  .authFormWrap.open {
    max-height: 800px;
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Form ── */
  .authForm {
    padding: 18px 20px 22px;
    display: grid;
    gap: 13px;
  }

  .authInputGroup { display: grid; gap: 6px; }

  .authInputRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .authLabel {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(230,242,255,0.4);
  }

  .authInput {
    width: 100%;
    min-height: 44px;
    padding: 11px 16px;
    border: 1.5px solid rgba(30,91,255,0.2);
    border-radius: 12px;
    background: rgba(10,15,30,0.65);
    color: #E6F2FF;
    font-size: 14px;
    font-family: 'Manrope', sans-serif;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .authInput::placeholder { color: rgba(230,242,255,0.18); }

  .authInput:focus {
    border-color: #1E5BFF;
    box-shadow: 0 0 0 3px rgba(30,91,255,0.13);
  }

  .authForgot {
    font-size: 12px;
    color: rgba(230,242,255,0.28);
    text-decoration: none;
    text-align: right;
    display: block;
    margin-top: 2px;
    transition: color 0.15s;
  }
  .authForgot:hover { color: #00E5D4; }

  .authSubmitBtn {
    width: 100%;
    padding: 13px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #1E5BFF 0%, #0EA5E9 100%);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Manrope', sans-serif;
    cursor: pointer;
    transition: opacity 0.18s, box-shadow 0.18s;
    box-shadow: 0 4px 16px rgba(30,91,255,0.28);
    margin-top: 2px;
  }

  .authSubmitBtn:hover {
    opacity: 0.9;
    box-shadow: 0 6px 22px rgba(30,91,255,0.42);
  }

  .authHint {
    font-size: 12px;
    color: rgba(230,242,255,0.28);
    text-align: center;
  }

  .authLink { color: #00E5D4; text-decoration: none; }
  .authLink:hover { text-decoration: underline; }

  /* ── Email / Phone toggle ── */
  .authContactToggle {
    display: grid;
    gap: 8px;
  }

  .authContactSwitch {
    display: flex;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 3px;
    border: 1px solid rgba(255,255,255,0.07);
    gap: 3px;
  }

  .authContactBtn {
    flex: 1;
    padding: 7px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: rgba(230,242,255,0.32);
    font-size: 12px;
    font-weight: 600;
    font-family: 'Manrope', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }

  .authContactBtn.active {
    background: rgba(30,91,255,0.22);
    color: #E6F2FF;
    box-shadow: 0 2px 8px rgba(30,91,255,0.2);
  }

  /* ── Checkbox ── */
  .authCheckbox {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    color: rgba(230,242,255,0.38);
    cursor: pointer;
    line-height: 1.5;
  }

  .authCheckbox input {
    width: 16px;
    height: 16px;
    min-height: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    accent-color: #1E5BFF;
    border-radius: 4px;
  }

  /* ── Fade animation ── */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Пульсирующий фон -->
<div class="authBg">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="orb4"></div>
</div>

<div class="authPage">
  <!-- Бренд -->
  <section class="authBrand">
    <img src="/assets/eltera_logo_horizontal_on_dark.svg?v=4" alt="Eltera">
    <h1>
      <span class="gradientText">Интеллект в оценке.</span><br>
      <span class="whiteText">Уверенность в решениях.</span>
    </h1>
    <p>Разберётесь за 5 минут. Первая оценка — за 1 минуту. Без инструкций и долгого обучения.</p>
  </section>

  <!-- Карточка -->
  <div class="authCard">

    <!-- Pill-переключатель -->
    <div class="authPill">
      <div class="authPillInner">
        <button class="authPillBtn active" id="tabLogin" onclick="switchTab('login')">Войти</button>
        <button class="authPillBtn" id="tabRegister" onclick="switchTab('register')">Зарегистрироваться</button>
      </div>
    </div>

    <!-- Форма входа -->
    <div class="authFormWrap open" id="wrapLogin">
      <form class="authForm" onsubmit="return false">
        <div class="authInputGroup">
          <label class="authLabel">Email или телефон</label>
          <input class="authInput" type="text" placeholder="name@company.ru или +7..." value="hr@eltera.ai">
        </div>
        <div class="authInputGroup">
          <label class="authLabel">Пароль</label>
          <input class="authInput" type="password" placeholder="Введите пароль" value="demo">
          <a href="#" class="authForgot">Забыли пароль?</a>
        </div>
        <button class="authSubmitBtn">Войти в кабинет</button>
        <p class="authHint">Нет аккаунта? <a href="#" class="authLink" onclick="switchTab('register'); return false">Зарегистрироваться</a></p>
      </form>
    </div>

    <!-- Форма регистрации -->
    <div class="authFormWrap" id="wrapRegister">
      <form class="authForm" onsubmit="return false">
        <div class="authInputRow">
          <div class="authInputGroup">
            <label class="authLabel">Имя</label>
            <input class="authInput" type="text" placeholder="Иван">
          </div>
          <div class="authInputGroup">
            <label class="authLabel">Фамилия</label>
            <input class="authInput" type="text" placeholder="Петров">
          </div>
        </div>
        <div class="authInputGroup">
          <label class="authLabel">Название компании</label>
          <input class="authInput" type="text" placeholder="ООО Ромашка">
        </div>
        <div class="authInputGroup">
          <label class="authLabel">Контакт для входа</label>
          <div class="authContactToggle">
            <div class="authContactSwitch">
              <button class="authContactBtn active" onclick="setContact('email', this)">Email</button>
              <button class="authContactBtn" onclick="setContact('phone', this)">Телефон</button>
            </div>
            <input class="authInput" id="contactInput" type="email" placeholder="name@company.ru">
          </div>
        </div>
        <div class="authInputGroup">
          <label class="authLabel">Пароль</label>
          <input class="authInput" type="password" placeholder="Минимум 8 символов">
        </div>
        <label class="authCheckbox">
          <input type="checkbox">
          <span>Согласен на <a href="#" class="authLink">обработку персональных данных</a></span>
        </label>
        <button class="authSubmitBtn">Создать аккаунт</button>
        <p class="authHint">Уже есть аккаунт? <a href="#" class="authLink" onclick="switchTab('login'); return false">Войти</a></p>
      </form>
    </div>

  </div><!-- /authCard -->
</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('wrapLogin').classList.toggle('open', isLogin);
    document.getElementById('wrapRegister').classList.toggle('open', !isLogin);
  }

  function setContact(type, btn) {
    btn.closest('.authContactSwitch').querySelectorAll('.authContactBtn')
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const input = document.getElementById('contactInput');
    input.type = type === 'email' ? 'email' : 'tel';
    input.placeholder = type === 'email' ? 'name@company.ru' : '+7 900 000-00-00';
  }
</script>
</body>
</html>
