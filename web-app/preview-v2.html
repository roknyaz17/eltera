<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ELTERA Logo v2 Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; }

  .section { padding: 48px 56px; border-bottom: 1px solid #eee; }
  .label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; margin-bottom: 28px; }
  .row { display: flex; align-items: center; gap: 56px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .col-label { font-size: 11px; color: #bbb; }
  .divider { width: 1px; height: 80px; background: #eee; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .badge-old { background: #f5f5f5; color: #999; }
  .badge-new { background: #e6f9f7; color: #00897B; }

  .dark { background: #0A0F1E; }
  .dark .label { color: rgba(255,255,255,0.25); }
  .dark .divider { background: rgba(255,255,255,0.08); }
  .dark .col-label { color: rgba(255,255,255,0.25); }

  .sizes { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
</style>
</head>
<body>

<!-- СВЕТЛЫЙ ФОН: сравнение v1 vs v2 -->
<div class="section" style="background:#fff">
  <div class="label">Светлый фон — SemiBold vs Bold</div>
  <div class="row">
    <div class="col">
      <span class="badge badge-old">v1 — SemiBold</span>
      <img src="/eltera-ref-light.svg" width="280" height="94" style="display:block"/>
    </div>
    <div class="divider"></div>
    <div class="col">
      <span class="badge badge-new">v2 — Bold 700 + равный spacing</span>
      <img src="/eltera-v2-light.svg" width="280" height="94" style="display:block"/>
    </div>
  </div>
</div>

<!-- ТЁМНЫЙ ФОН: сравнение v1 vs v2 -->
<div class="section dark">
  <div class="label">Тёмный фон — SemiBold vs Bold</div>
  <div class="row">
    <div class="col">
      <span class="badge badge-old">v1 — SemiBold</span>
      <img src="/eltera-ref-dark.svg" width="280" height="94" style="display:block"/>
    </div>
    <div class="divider"></div>
    <div class="col">
      <span class="badge badge-new">v2 — Bold 700 + равный spacing</span>
      <img src="/eltera-v2-dark.svg" width="280" height="94" style="display:block"/>
    </div>
  </div>
</div>

<!-- МАСШТАБЫ v2 светлая -->
<div class="section" style="background:#f8f9fb">
  <div class="label">Масштабы — v2 светлая</div>
  <div class="sizes">
    <div class="col">
      <img src="/eltera-v2-light.svg" width="300" height="100" style="display:block"/>
      <div class="col-label">300px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-light.svg" width="220" height="73" style="display:block"/>
      <div class="col-label">220px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-light.svg" width="160" height="53" style="display:block"/>
      <div class="col-label">160px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-light.svg" width="110" height="37" style="display:block"/>
      <div class="col-label">110px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-light.svg" width="80" height="27" style="display:block"/>
      <div class="col-label">80px</div>
    </div>
  </div>
</div>

<!-- МАСШТАБЫ v2 тёмная -->
<div class="section dark">
  <div class="label">Масштабы — v2 тёмная</div>
  <div class="sizes">
    <div class="col">
      <img src="/eltera-v2-dark.svg" width="300" height="100" style="display:block"/>
      <div class="col-label">300px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-dark.svg" width="220" height="73" style="display:block"/>
      <div class="col-label">220px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-dark.svg" width="160" height="53" style="display:block"/>
      <div class="col-label">160px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-dark.svg" width="110" height="37" style="display:block"/>
      <div class="col-label">110px</div>
    </div>
    <div class="col">
      <img src="/eltera-v2-dark.svg" width="80" height="27" style="display:block"/>
      <div class="col-label">80px</div>
    </div>
  </div>
</div>

</body>
</html>
