<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FD6FF"/>
      <stop offset="0.44" stop-color="#1E5BFF"/>
      <stop offset="1" stop-color="#0A45D9"/>
    </linearGradient>
    <linearGradient id="barCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A6FFF7"/>
      <stop offset="0.36" stop-color="#00E5D4"/>
      <stop offset="1" stop-color="#1E5BFF"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#D6FFF9"/>
      <stop offset="0.46" stop-color="#00E5D4"/>
      <stop offset="1" stop-color="#1E5BFF"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
