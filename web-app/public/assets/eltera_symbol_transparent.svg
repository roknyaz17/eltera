  <g filter="url(#softGlow)">
    <rect x="118" y="276" width="48" height="122" rx="14" fill="url(#barBlue)"/>
    <rect x="190" y="220" width="48" height="178" rx="14" fill="url(#barCyan)"/>
    <rect x="262" y="220" width="48" height="178" rx="14" fill="url(#barCyan)"/>
    <rect x="334" y="276" width="48" height="122" rx="14" fill="url(#barBlue)"/>
    <circle cx="256" cy="144" r="38" fill="url(#orb)"/>
  </g>
</svg>
