<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <defs>
    <!-- Объёмный радиальный градиент символа -->
    <radialGradient id="symBody" cx="35%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#90FFFF"/>
      <stop offset="20%"  stop-color="#00E5D4"/>
      <stop offset="55%"  stop-color="#009AAB"/>
      <stop offset="100%" stop-color="#004455"/>
    </radialGradient>

    <!-- Блик -->
    <radialGradient id="symHL" cx="25%" cy="20%" r="45%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Тень -->
    <radialGradient id="symSh" cx="70%" cy="75%" r="50%">
      <stop offset="0%"   stop-color="#001122" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#001122" stop-opacity="0"/>
    </radialGradient>

    <!-- Контур символа -->
    <linearGradient id="symStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#CCFFFF"/>
      <stop offset="100%" stop-color="#006688"/>
    </linearGradient>

    <!-- Градиент текста (светлый для тёмного фона) -->
    <linearGradient id="txtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#BBFFFF"/>
      <stop offset="40%"  stop-color="#00E5D4"/>
      <stop offset="100%" stop-color="#0099BB"/>
    </linearGradient>

    <!-- Мягкое свечение -->
    <filter id="symGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00E5D4" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Символ "E" — кольцо с вырезом справа
    Центр: (50, 50), внешний R=44, внутренний R=27
    Вырез: ±30° от оси X
    sin30°=0.5, cos30°=0.866
    Внешний R=44: top=(88.1,28.0), bottom=(88.1,72.0)
    Внутренний R=27: top=(73.4,36.5), bottom=(73.4,63.5)
  -->

  <!-- Свечение -->
  <path d="M 88.1,28.0 A 44,44 0 1,0 88.1,72.0 L 73.4,63.5 A 27,27 0 1,1 73.4,36.5 Z"
        fill="url(#symBody)" filter="url(#symGlow)"/>

  <!-- Основная форма -->
  <path d="M 88.1,28.0 A 44,44 0 1,0 88.1,72.0 L 73.4,63.5 A 27,27 0 1,1 73.4,36.5 Z"
        fill="url(#symBody)"
        stroke="url(#symStroke)"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Тень -->
  <path d="M 88.1,28.0 A 44,44 0 1,0 88.1,72.0 L 73.4,63.5 A 27,27 0 1,1 73.4,36.5 Z"
        fill="url(#symSh)"/>

  <!-- Блик -->
  <path d="M 88.1,28.0 A 44,44 0 1,0 88.1,72.0 L 73.4,63.5 A 27,27 0 1,1 73.4,36.5 Z"
        fill="url(#symHL)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  ТЕКСТ "LTERA" — сдвинут ближе к символу          -->
  <!--  Начало x=94 (вплотную к символу)                 -->
  <!--  cap-height=52px (y=24..76), gap между буквами 6px-->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- L  (x=94..124) -->
  <rect x="94" y="24" width="11" height="52" rx="4" fill="url(#txtGrad)"/>
  <rect x="94" y="65" width="30" height="11" rx="4" fill="url(#txtGrad)"/>

  <!-- T  (x=132..170) -->
  <rect x="132" y="24" width="38" height="11" rx="4" fill="url(#txtGrad)"/>
  <rect x="146" y="24" width="11" height="52" rx="4" fill="url(#txtGrad)"/>

  <!-- E  (x=178..214) -->
  <rect x="178" y="24" width="11" height="52" rx="4" fill="url(#txtGrad)"/>
  <rect x="178" y="24" width="34" height="11" rx="4" fill="url(#txtGrad)"/>
  <rect x="178" y="44" width="25" height="10" rx="4" fill="url(#txtGrad)"/>
  <rect x="178" y="65" width="34" height="11" rx="4" fill="url(#txtGrad)"/>

  <!-- R  (x=222..262) -->
  <rect x="222" y="24" width="11" height="52" rx="4" fill="url(#txtGrad)"/>
  <path d="M 233,24 L 248,24 Q 264,24 264,43 Q 264,60 248,62 L 233,62 L 233,52 L 246,52 Q 253,52 253,43 Q 253,34 246,34 L 233,34 Z"
        fill="url(#txtGrad)"/>
  <path d="M 239,57 L 266,76 Q 269,78 267,82 Q 265,86 261,84 L 233,65 Z"
        fill="url(#txtGrad)"/>

  <!-- A  (x=272..326) -->
  <path d="M 274,76 L 295,24 Q 297,19 302,19 Q 307,19 309,24 L 330,76 Q 332,80 328,82 Q 324,84 322,80 L 302,34 L 282,80 Q 280,84 276,82 Q 272,80 274,76 Z"
        fill="url(#txtGrad)"/>
  <rect x="285" y="56" width="34" height="10" rx="4" fill="url(#txtGrad)"/>

</svg>
