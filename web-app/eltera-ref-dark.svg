<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 383 120" fill="none">
  <defs>

    <!-- ═══ ВЕРХНЯЯ ПОЛОСА: стеклянно-голубая ═══ -->
    <linearGradient id="dtop-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B8DCFF" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#7EC8FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4AAEFF" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="dtop-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>
    <linearGradient id="dtop-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#5AAEFF" stop-opacity="0.30"/>
    </linearGradient>
    <!-- Внутренняя тень снизу -->
    <linearGradient id="dtop-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#1A5FBF" stop-opacity="0.20"/>
    </linearGradient>

    <!-- ═══ ЦЕНТРАЛЬНАЯ ПОЛОСА: ярко-голубая акцентная ═══ -->
    <linearGradient id="dmid-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1060E8"/>
      <stop offset="30%"  stop-color="#1E8FFF"/>
      <stop offset="65%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00F0E0"/>
    </linearGradient>
    <linearGradient id="dmid-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="45%"  stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>
    <linearGradient id="dmid-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#0050CC" stop-opacity="0.40"/>
    </linearGradient>
    <!-- Синий блик слева (как в референсе) -->
    <radialGradient id="dmid-left-glow" cx="0.12" cy="0.5" r="0.35">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </radialGradient>
    <!-- Внутренняя тень снизу -->
    <linearGradient id="dmid-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#003399" stop-opacity="0.25"/>
    </linearGradient>

    <!-- ═══ НИЖНЯЯ ПОЛОСА: стеклянно-голубая (темнее верхней) ═══ -->
    <linearGradient id="dbot-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A0CCFF" stop-opacity="0.50"/>
      <stop offset="50%"  stop-color="#6ABAFF" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#3A9AEE" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="dbot-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.80"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>
    <linearGradient id="dbot-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#4488CC" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="dbot-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#1A4A99" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Clip paths -->
    <clipPath id="dclip-top"><rect x="8.0" y="26.00" width="90.0" height="18.0" rx="9.0"/></clipPath>
    <clipPath id="dclip-mid"><rect x="8.0" y="51.00" width="90.0" height="18.0" rx="9.0"/></clipPath>
    <clipPath id="dclip-bot"><rect x="8.0" y="76.00" width="90.0" height="18.0" rx="9.0"/></clipPath>
  </defs>

  <!-- ═══ ВЕРХНЯЯ ПОЛОСА ═══ -->
  <!-- Основное тело -->
  <rect x="8.0" y="26.00" width="90.0" height="18.0" rx="9.0" fill="url(#dtop-body)"/>
  <!-- Внутренняя тень снизу -->
  <rect x="8.0" y="26.00" width="90.0" height="18.0" rx="9.0" fill="url(#dtop-inner)" clip-path="url(#dclip-top)"/>
  <!-- Обводка -->
  <rect x="8.0" y="26.00" width="90.0" height="18.0" rx="9.0" fill="none" stroke="url(#dtop-border)" stroke-width="0.8"/>
  <!-- Блик сверху (верхняя половина) -->
  <rect x="9.50" y="27.50" width="87.00" height="7.56" rx="3.78" fill="url(#dtop-shine)" clip-path="url(#dclip-top)"/>

  <!-- ═══ ЦЕНТРАЛЬНАЯ ПОЛОСА ═══ -->
  <rect x="8.0" y="51.00" width="90.0" height="18.0" rx="9.0" fill="url(#dmid-body)"/>
  <!-- Внутренняя тень снизу -->
  <rect x="8.0" y="51.00" width="90.0" height="18.0" rx="9.0" fill="url(#dmid-inner)" clip-path="url(#dclip-mid)"/>
  <!-- Обводка -->
  <rect x="8.0" y="51.00" width="90.0" height="18.0" rx="9.0" fill="none" stroke="url(#dmid-border)" stroke-width="0.8"/>
  <!-- Блик сверху -->
  <rect x="9.50" y="52.50" width="87.00" height="7.56" rx="3.78" fill="url(#dmid-shine)" clip-path="url(#dclip-mid)"/>
  <!-- Синий блик слева -->
  <rect x="8.0" y="51.00" width="90.0" height="18.0" rx="9.0" fill="url(#dmid-left-glow)" clip-path="url(#dclip-mid)"/>

  <!-- ═══ НИЖНЯЯ ПОЛОСА ═══ -->
  <rect x="8.0" y="76.00" width="90.0" height="18.0" rx="9.0" fill="url(#dbot-body)"/>
  <rect x="8.0" y="76.00" width="90.0" height="18.0" rx="9.0" fill="url(#dbot-inner)" clip-path="url(#dclip-bot)"/>
  <rect x="8.0" y="76.00" width="90.0" height="18.0" rx="9.0" fill="none" stroke="url(#dbot-border)" stroke-width="0.8"/>
  <rect x="9.50" y="77.50" width="87.00" height="7.56" rx="3.78" fill="url(#dbot-shine)" clip-path="url(#dclip-bot)"/>

