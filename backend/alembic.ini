[alembic]
script_location = alembic
prepend_sys_path = .
# Revision file name: date_rev_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sqlalchemy.url is injected from app.core.config in env.py, left empty here.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
