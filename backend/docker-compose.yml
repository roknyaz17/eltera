services:
  db:
    image: postgres:16-alpine
    container_name: eltera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eltera
      POSTGRES_PASSWORD: eltera
      POSTGRES_DB: eltera
    ports:
      - "5432:5432"
    volumes:
      - eltera_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eltera -d eltera"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: eltera-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - eltera_prometheus:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Чтобы контейнер видел бэкенд, запущенный на хосте (Linux).
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: eltera-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./ops/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./ops/dashboards:/etc/grafana/dashboards:ro
      - eltera_grafana:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  eltera_pgdata:
  eltera_prometheus:
  eltera_grafana:
